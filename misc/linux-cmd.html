<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charSet='utf-8'/>
        <meta name='viewport' content='width=device-width, initial-scale=1'/>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Linux 命令快捷搜索</title>
    </head>
    <body>
        <p class="text-xs font-medium uppercase tracking-wider text-slate-400 dark:text-slate-500 mt-1 mb-1 text-center">—— Linux 命令 · 快捷搜索 ——</p>
        <div class="flex justify-center">
            <form id="form" class="flex w-full max-w-xl">
                
                <!-- 输入框 -->
                <div class="relative flex-grow">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                    <!-- 搜索图标 -->
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-5 h-5"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">
                    <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z"/>
                    </svg>
                </span>

                <input
                    id="search"
                    type="text"
                    placeholder="输入命令，一键跳转。"
                    class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-l-xl
                        focus:outline-none focus:ring-2 focus:ring-emerald-500
                        focus:border-emerald-500 transition"
                />
                </div>

                <!-- 按钮 -->
                <button
                type="submit"
                class="px-6 py-3 bg-emerald-500 text-white font-medium
                        rounded-r-xl hover:bg-emerald-600
                        active:scale-95 transition">
                    跳转
                </button>

            </form>
        </div>
        <script>
            let cmds = [];

            async function load() {
                const response = await fetch('https://xplanc.org/primers/sitemap.xml');
                if (response.ok) {
                    const data = await response.text();
                    cmds = [...data.matchAll(/https:\/\/xplanc\.org\/primers\/document\/zh\/10\.Bash\/90\.%E5%B8%AE%E5%8A%A9%E6%89%8B%E5%86%8C\/EX\.(.*?)\.md/g)];
                }
            }

            async function search(ev) {
                ev.preventDefault();
                if (cmds.length === 0) {
                    await load();
                }

                const text = document.getElementById('search').value.trim().toLowerCase();
                for (const cmd of cmds) {
                    if (cmd[1].toLowerCase() === text) {
                        window.location.assign(cmd[0]);
                        return;
                    }
                }

                alert(`没找到 '${text}'`);
            }

            document.getElementById("form").addEventListener("submit", search);
        </script>
    </body>
</html>
