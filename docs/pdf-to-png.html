<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转 PNG 小工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background-color: #f8f9fa; color: #333; line-height: 1.6; }
        .header { text-align: center; margin-bottom: 30px; }
        
        /* 拖拽区域样式 */
        .drop-zone {
            background: white;
            border: 2px dashed #007bff;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }
        .drop-zone.drag-over {
            background: #e7f3ff;
            border-color: #0056b3;
            transform: scale(1.02);
        }
        .drop-zone p { font-size: 18px; color: #555; margin: 10px 0; }
        .drop-zone .icon { font-size: 48px; margin-bottom: 10px; display: block; }
        #pdf-upload { display: none; } /* 隐藏原生输入框 */

        .status-bar { text-align: center; margin-bottom: 20px; min-height: 24px; }
        #status-text { font-weight: 600; color: #007bff; }

        .action-bar { text-align: center; margin-bottom: 30px; }
        #download-all-btn { 
            display: none;
            padding: 12px 30px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #download-all-btn:hover { background: #218838; transform: translateY(-1px); }

        .image-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .page-item { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .page-item img { width: 100%; border-radius: 4px; margin-bottom: 10px; }
        .download-btn { font-size: 12px; color: #007bff; text-decoration: none; border: 1px solid #007bff; padding: 4px 10px; border-radius: 4px; }
        .download-btn:hover { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PDF 转图片工具</h1>
        <p>安全、快速、无需上传服务器</p>
    </div>

    <div id="drop-zone" class="drop-zone">
        <span class="icon">📄</span>
        <p>点击选择 或 将 PDF 文件拖拽到这里</p>
        <p style="font-size: 14px; color: #888;">支持多页 PDF 自动拆分</p>
        <input type="file" id="pdf-upload" accept="application/pdf" />
    </div>

    <div class="status-bar">
        <span id="status-text">准备就绪</span>
    </div>

    <div class="action-bar">
        <button id="download-all-btn">打包下载全部 PNG (.zip)</button>
    </div>

    <div id="output" class="image-container"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const uploadInput = document.getElementById('pdf-upload');
        const outputContainer = document.getElementById('output');
        const statusText = document.getElementById('status-text');
        const downloadAllBtn = document.getElementById('download-all-btn');

        let generatedImages = [];
        let currentFilename = "images";

        // --- 核心：拖拽交互处理 ---

        // 点击拖拽区域触发隐藏的 input
        dropZone.addEventListener('click', () => uploadInput.click());

        // 处理拖拽进入
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        // 处理拖拽离开
        ['dragleave', 'drop', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => dropZone.classList.remove('drag-over'));
        });

        // 处理放下文件
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        // 处理点击上传
        uploadInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // --- 业务逻辑处理 ---

        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                alert('请上传 PDF 格式的文件！');
                return;
            }

            // 重置状态
            outputContainer.innerHTML = '';
            generatedImages = [];
            downloadAllBtn.style.display = 'none';
            currentFilename = file.name.replace(/\.[^/.]+$/, "");
            
            try {
                statusText.textContent = '🚀 正在加载 PDF...';
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    statusText.textContent = `⚡ 正在转换第 ${i} / ${pdf.numPages} 页...`;
                    await renderPage(pdf, i);
                }

                statusText.textContent = `✅ 完成！共生成 ${pdf.numPages} 张图片`;
                downloadAllBtn.style.display = 'inline-block';
            } catch (err) {
                console.error(err);
                statusText.textContent = '❌ 出错啦，请重试';
            }
        }

        async function renderPage(pdf, pageNum) {
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport }).promise;
            const dataUrl = canvas.toDataURL('image/png');

            generatedImages.push({ pageNum, dataUrl });
            
            // UI 显示
            const div = document.createElement('div');
            div.className = 'page-item';
            div.innerHTML = `
                <img src="${dataUrl}" />
                <div style="margin-bottom:5px">第 ${pageNum} 页</div>
                <a class="download-btn" href="${dataUrl}" download="${currentFilename}_${pageNum}.png">下载单页</a>
            `;
            outputContainer.appendChild(div);
        }

        // 打包下载
        downloadAllBtn.onclick = async () => {
            downloadAllBtn.disabled = true;
            downloadAllBtn.textContent = '正在压缩...';
            
            const zip = new JSZip();
            generatedImages.forEach(img => {
                const b64 = img.dataUrl.split(',')[1];
                zip.file(`${currentFilename}_${img.pageNum.toString().padStart(3, '0')}.png`, b64, {base64: true});
            });

            const content = await zip.generateAsync({type: "blob"});
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentFilename}_all_pages.zip`;
            a.click();
            URL.revokeObjectURL(url);
            
            downloadAllBtn.disabled = false;
            downloadAllBtn.textContent = '打包下载全部 PNG (.zip)';
        };
    </script>
</body>
</html>
