<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>哈希计算器 - 支持文本与文件 | MD5/SHA系列</title>
    <!-- 引入 CryptoJS 成熟库，稳定支持所有哈希算法 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 880px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(0px);
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .header {
            background: #1e2a3e;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
        }

        .header p {
            margin: 0.5rem 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .content {
            padding: 2rem;
        }

        /* 算法选择行 */
        .algo-section {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1.8rem;
            background: #f8fafc;
            padding: 0.9rem 1.2rem;
            border-radius: 1.5rem;
            border: 1px solid #e2edf2;
        }

        .algo-label {
            font-weight: 600;
            color: #0f2b3d;
            background: #e9f0f5;
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        select {
            flex: 2;
            min-width: 160px;
            background: white;
            border: 1px solid #cbdde6;
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            outline: none;
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        /* 双模式区块 */
        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #e2edf2;
            padding-bottom: 0.5rem;
        }

        .mode-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            color: #4a627a;
        }

        .mode-btn.active {
            background: #1e2a3e;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .mode-btn:not(.active):hover {
            background: #e9edf2;
            color: #0f2b3d;
        }

        /* 面板 */
        .panel {
            display: none;
            animation: fade 0.2s ease;
        }

        .panel.active-panel {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        textarea {
            width: 100%;
            border: 1px solid #cbdde6;
            border-radius: 1.2rem;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            resize: vertical;
            background: #fefefe;
            transition: 0.2s;
        }

        textarea:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .file-area {
            background: #f9fdfe;
            border: 2px dashed #bdd3e0;
            border-radius: 1.5rem;
            padding: 1.8rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1rem;
        }

        .file-area:hover {
            background: #f1f9ff;
            border-color: #3b82f6;
        }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e2a3e;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .file-input-label:hover {
            background: #0f2b3d;
            transform: scale(0.97);
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #2c5a74;
            background: #eef3f7;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.8rem 0 1.2rem;
        }

        .btn {
            background: #eef2f5;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #1e2a3e;
        }

        .btn-primary {
            background: #1e2a3e;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #0f2b3d;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .result-area {
            background: #f1f5f9;
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-top: 1rem;
            word-break: break-all;
            border: 1px solid #e2edf2;
        }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #3b6e8b;
            margin-bottom: 0.5rem;
        }

        .hash-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            background: white;
            padding: 0.8rem;
            border-radius: 1rem;
            border: 1px solid #dce5ec;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            background: white;
            border: 1px solid #bdd3e0;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            margin-left: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-btn:hover {
            background: #e2edf2;
        }

        .status-msg {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: #2c6e2c;
            background: #e6f4ea;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            display: inline-block;
        }

        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #e2edf2;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #6c8aa3;
            border-top: 1px solid #e9eff3;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🔐 哈希计算器</h1>
        <p>文本哈希 · 文件指纹 · 支持 MD5 及多种算法（基于 CryptoJS）</p>
    </div>
    <div class="content">
        <!-- 算法选择区 -->
        <div class="algo-section">
            <span class="algo-label">哈希算法</span>
            <select id="algorithmSelect">
                <option value="MD5" selected>MD5 (默认)</option>
                <option value="SHA-1">SHA-1</option>
                <option value="SHA-256">SHA-256</option>
                <option value="SHA-384">SHA-384</option>
                <option value="SHA-512">SHA-512</option>
            </select>
        </div>

        <!-- 模式切换 -->
        <div class="mode-tabs">
            <button class="mode-btn active" data-mode="text">📝 文本模式</button>
            <button class="mode-btn" data-mode="file">📁 文件模式</button>
        </div>

        <!-- 文本模式面板 -->
        <div id="textPanel" class="panel active-panel">
            <textarea id="textInput" rows="5" placeholder="在此输入文本，例如：Hello World!&#10;输入后将自动或手动计算哈希值"></textarea>
            <div class="action-buttons">
                <button id="calcTextBtn" class="btn btn-primary">⚡ 计算文本哈希</button>
                <button id="clearTextBtn" class="btn btn-secondary">🗑 清空</button>
            </div>
        </div>

        <!-- 文件模式面板 -->
        <div id="filePanel" class="panel">
            <div class="file-area" id="fileDropArea">
                <label class="file-input-label">
                    📂 选择文件
                    <input type="file" id="fileInput">
                </label>
                <div id="fileInfo" class="file-info">未选择任何文件</div>
                <div style="font-size:0.7rem; margin-top:10px; color:#5e7e97;">支持点击或拖拽文件至此区域</div>
            </div>
            <div class="action-buttons">
                <button id="calcFileBtn" class="btn btn-primary">🔍 计算文件哈希</button>
                <button id="clearFileBtn" class="btn btn-secondary">⟳ 清除文件</button>
            </div>
        </div>

        <!-- 结果展示区 -->
        <div class="result-area">
            <div class="result-label">
                📋 哈希结果
                <button id="copyHashBtn" class="copy-btn" style="float:right;">复制</button>
            </div>
            <div id="hashResult" class="hash-value">—— 等待计算 ——</div>
            <div id="statusMessage" class="status-msg" style="display: none;"></div>
        </div>
        <footer>✨ 支持大文件流式处理，使用 CryptoJS 确保 MD5 等算法稳定准确。大文件哈希计算采用分块读取，不阻塞UI。</footer>
    </div>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const algoSelect = document.getElementById('algorithmSelect');
        const textPanel = document.getElementById('textPanel');
        const filePanel = document.getElementById('filePanel');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const textInput = document.getElementById('textInput');
        const calcTextBtn = document.getElementById('calcTextBtn');
        const clearTextBtn = document.getElementById('clearTextBtn');
        const fileInput = document.getElementById('fileInput');
        const fileInfoDiv = document.getElementById('fileInfo');
        const calcFileBtn = document.getElementById('calcFileBtn');
        const clearFileBtn = document.getElementById('clearFileBtn');
        const hashResultDiv = document.getElementById('hashResult');
        const copyHashBtn = document.getElementById('copyHashBtn');
        const statusMsgDiv = document.getElementById('statusMessage');
        const fileDropArea = document.getElementById('fileDropArea');

        // 当前选中的文件对象 (File)
        let currentFile = null;
        // 当前活动模式: 'text' 或 'file'
        let currentMode = 'text';
        // 用于记录上次计算结果
        let lastHashValue = '';

        // ---------- 辅助函数 ----------
        function showStatus(message, isError = false) {
            statusMsgDiv.style.display = 'inline-block';
            statusMsgDiv.textContent = message;
            statusMsgDiv.style.backgroundColor = isError ? '#ffe6e5' : '#e6f4ea';
            statusMsgDiv.style.color = isError ? '#b91c1c' : '#2c6e2c';
            setTimeout(() => {
                if (statusMsgDiv.style.display === 'inline-block') {
                    setTimeout(() => {
                        if (statusMsgDiv.style.display === 'inline-block') 
                            statusMsgDiv.style.display = 'none';
                    }, 2500);
                }
            }, 2000);
        }

        function hideStatus() {
            statusMsgDiv.style.display = 'none';
        }

        // 更新哈希结果显示
        function setHashResult(value) {
            if (!value) {
                hashResultDiv.innerHTML = '—— 无结果 ——';
                lastHashValue = '';
                return;
            }
            hashResultDiv.innerHTML = value;
            lastHashValue = value;
        }

        // ---------- 使用 CryptoJS 计算哈希 ----------
        // 文本哈希计算（同步，但为了统一异步风格使用Promise）
        function computeTextHashWithCryptoJS(text, algorithm) {
            return new Promise((resolve) => {
                let result = '';
                try {
                    if (algorithm === 'MD5') {
                        result = CryptoJS.MD5(text).toString();
                    } else if (algorithm === 'SHA-1') {
                        result = CryptoJS.SHA1(text).toString();
                    } else if (algorithm === 'SHA-256') {
                        result = CryptoJS.SHA256(text).toString();
                    } else if (algorithm === 'SHA-384') {
                        result = CryptoJS.SHA384(text).toString();
                    } else if (algorithm === 'SHA-512') {
                        result = CryptoJS.SHA512(text).toString();
                    } else {
                        throw new Error('不支持的算法');
                    }
                } catch (err) {
                    throw err;
                }
                resolve(result);
            });
        }

        // 文件哈希计算: 使用 FileReader 分块读取 + CryptoJS 的 WordArray 构建（支持大文件流式增量更新）
        // 为了支持大文件并且不卡UI，采用 slice 分块 + 增量哈希 (CryptoJS 支持)
        function computeFileHashWithCryptoJS(file, algorithm) {
            return new Promise((resolve, reject) => {
                const chunkSize = 1024 * 1024; // 1MB 分块
                let currentOffset = 0;
                let totalSize = file.size;
                let hasher = null;
                
                // 根据算法初始化 hasher 对象 (CryptoJS 算法对象)
                switch(algorithm) {
                    case 'MD5': hasher = CryptoJS.algo.MD5.create(); break;
                    case 'SHA-1': hasher = CryptoJS.algo.SHA1.create(); break;
                    case 'SHA-256': hasher = CryptoJS.algo.SHA256.create(); break;
                    case 'SHA-384': hasher = CryptoJS.algo.SHA384.create(); break;
                    case 'SHA-512': hasher = CryptoJS.algo.SHA512.create(); break;
                    default: reject(new Error('不支持的算法'));
                }
                
                function readNextChunk() {
                    if (currentOffset >= totalSize) {
                        // 读取完毕，计算最终哈希
                        const finalHash = hasher.finalize().toString();
                        resolve(finalHash);
                        return;
                    }
                    
                    const end = Math.min(currentOffset + chunkSize, totalSize);
                    const blob = file.slice(currentOffset, end);
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const arrayBuffer = e.target.result;
                        // 将 ArrayBuffer 转换为 CryptoJS 可识别的 WordArray
                        const wordArray = CryptoJS.lib.WordArray.create(new Uint8Array(arrayBuffer));
                        hasher.update(wordArray);
                        currentOffset = end;
                        // 更新进度消息 (可选)
                        const percent = ((currentOffset / totalSize) * 100).toFixed(1);
                        showStatus(`⏳ 正在计算哈希... ${percent}%`, false);
                        // 继续下一块
                        setTimeout(readNextChunk, 0);
                    };
                    reader.onerror = function(err) {
                        reject(new Error('读取文件分块失败: ' + err.message));
                    };
                    reader.readAsArrayBuffer(blob);
                }
                
                readNextChunk();
            });
        }

        // ---------- 文本哈希计算入口 ----------
        async function computeTextHash() {
            const text = textInput.value;
            if (!text.trim()) {
                setHashResult('');
                showStatus('⚠️ 请输入文本内容', true);
                return;
            }
            const algo = algoSelect.value;
            try {
                showStatus(`⏳ 正在计算 ${algo} 哈希...`);
                const hash = await computeTextHashWithCryptoJS(text, algo);
                setHashResult(hash);
                showStatus(`✅ 计算完成: ${algo} 哈希已生成`);
            } catch (err) {
                console.error(err);
                setHashResult('');
                showStatus(`❌ 计算失败: ${err.message}`, true);
            }
        }

        // ---------- 文件哈希计算入口 ----------
        async function computeFileHash() {
            if (!currentFile) {
                showStatus('请先选择文件', true);
                setHashResult('');
                return;
            }
            const algo = algoSelect.value;
            try {
                showStatus(`📁 正在计算 ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB) 的 ${algo}...`);
                const hash = await computeFileHashWithCryptoJS(currentFile, algo);
                setHashResult(hash);
                showStatus(`✅ 文件哈希完成: ${algo}`);
            } catch (err) {
                console.error(err);
                setHashResult('');
                showStatus(`❌ 文件处理失败: ${err.message}`, true);
            }
        }

        // 文件选择更新UI
        function updateFileInfo(file) {
            if (file) {
                const sizeText = file.size < 1024 ? `${file.size} B` : `${(file.size / 1024).toFixed(2)} KB`;
                fileInfoDiv.innerHTML = `📄 ${file.name} (${sizeText})`;
                currentFile = file;
                // 可选：自动清空之前的结果
                setHashResult('');
            } else {
                fileInfoDiv.innerHTML = '未选择任何文件';
                currentFile = null;
                setHashResult('');
            }
        }

        function handleFileSelect(file) {
            if (!file) return;
            updateFileInfo(file);
            // 不自动计算，等待用户点击按钮
        }

        // 清除文件
        function clearFile() {
            fileInput.value = '';
            updateFileInfo(null);
            setHashResult('');
            hideStatus();
        }

        // 拖拽处理
        function setupDragAndDrop() {
            fileDropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileDropArea.style.background = '#eef7fc';
            });
            fileDropArea.addEventListener('dragleave', () => {
                fileDropArea.style.background = '#f9fdfe';
            });
            fileDropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                fileDropArea.style.background = '#f9fdfe';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                } else {
                    showStatus('拖拽无效，请重新选择', true);
                }
            });
        }

        // 模式切换
        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'text') {
                textPanel.classList.add('active-panel');
                filePanel.classList.remove('active-panel');
                document.querySelector('[data-mode="text"]').classList.add('active');
                document.querySelector('[data-mode="file"]').classList.remove('active');
            } else {
                filePanel.classList.add('active-panel');
                textPanel.classList.remove('active-panel');
                document.querySelector('[data-mode="file"]').classList.add('active');
                document.querySelector('[data-mode="text"]').classList.remove('active');
            }
            // 切换模式时不清空结果，保留上次计算，但保持界面一致性
        }

        // 复制哈希
        function copyHash() {
            if (lastHashValue && lastHashValue !== '—— 无结果 ——' && lastHashValue !== '—— 等待计算 ——') {
                navigator.clipboard.writeText(lastHashValue).then(() => {
                    showStatus('📋 哈希已复制到剪贴板');
                }).catch(() => showStatus('复制失败', true));
            } else {
                showStatus('没有可复制的哈希值', true);
            }
        }

        // 事件绑定
        calcTextBtn.addEventListener('click', computeTextHash);
        clearTextBtn.addEventListener('click', () => { textInput.value = ''; setHashResult(''); hideStatus(); });
        calcFileBtn.addEventListener('click', computeFileHash);
        clearFileBtn.addEventListener('click', clearFile);
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFileSelect(e.target.files[0]);
            else clearFile();
        });
        copyHashBtn.addEventListener('click', copyHash);
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-mode');
                if (mode === 'text') switchMode('text');
                else switchMode('file');
            });
        });
        
        setupDragAndDrop();
        switchMode('text');
        // 预设示例文本
        textInput.value = 'Hello World';
        // 自动计算一次示例哈希
        setTimeout(() => {
            computeTextHash();
        }, 100);
    })();
</script>
</body>
</html>
