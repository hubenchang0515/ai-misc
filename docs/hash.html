<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>哈希计算器 - 支持文本与文件 | MD5/SHA1/SHA2/SHA3全系列</title>
    <!-- 引入 CryptoJS 完整库，支持 MD5, SHA1, SHA256, SHA384, SHA512, SHA3 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 920px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .header {
            background: #1e2a3e;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
        }

        .header p {
            margin: 0.5rem 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .content {
            padding: 2rem;
        }

        .algo-section {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1.8rem;
            background: #f8fafc;
            padding: 0.9rem 1.2rem;
            border-radius: 1.5rem;
            border: 1px solid #e2edf2;
        }

        .algo-label {
            font-weight: 600;
            color: #0f2b3d;
            background: #e9f0f5;
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        select {
            flex: 2;
            min-width: 180px;
            background: white;
            border: 1px solid #cbdde6;
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .mode-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #e2edf2;
            padding-bottom: 0.5rem;
        }

        .mode-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            color: #4a627a;
        }

        .mode-btn.active {
            background: #1e2a3e;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .mode-btn:not(.active):hover {
            background: #e9edf2;
            color: #0f2b3d;
        }

        .panel {
            display: none;
            animation: fade 0.2s ease;
        }

        .panel.active-panel {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        textarea {
            width: 100%;
            border: 1px solid #cbdde6;
            border-radius: 1.2rem;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            resize: vertical;
            background: #fefefe;
            transition: 0.2s;
        }

        textarea:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .file-area {
            background: #f9fdfe;
            border: 2px dashed #bdd3e0;
            border-radius: 1.5rem;
            padding: 1.8rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1rem;
        }

        .file-area:hover {
            background: #f1f9ff;
            border-color: #3b82f6;
        }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e2a3e;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .file-input-label:hover {
            background: #0f2b3d;
            transform: scale(0.97);
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #2c5a74;
            background: #eef3f7;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.8rem 0 1.2rem;
        }

        .btn {
            background: #eef2f5;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #1e2a3e;
        }

        .btn-primary {
            background: #1e2a3e;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #0f2b3d;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #e2e8f0;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .result-area {
            background: #f1f5f9;
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-top: 1rem;
            word-break: break-all;
            border: 1px solid #e2edf2;
        }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #3b6e8b;
            margin-bottom: 0.5rem;
        }

        .hash-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            background: white;
            padding: 0.8rem;
            border-radius: 1rem;
            border: 1px solid #dce5ec;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .copy-btn {
            background: white;
            border: 1px solid #bdd3e0;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            margin-left: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-btn:hover {
            background: #e2edf2;
        }

        .status-msg {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            display: inline-block;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #6c8aa3;
            border-top: 1px solid #e9eff3;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🔐 哈希计算器</h1>
        <p>文本/文件指纹 · MD5 · SHA-1 · SHA-2 · <strong style="color:#ffd966;">SHA-3 (224/256/384/512)</strong></p>
    </div>
    <div class="content">
        <div class="algo-section">
            <span class="algo-label">哈希算法</span>
            <select id="algorithmSelect">
                <option value="MD5" selected>MD5 (默认)</option>
                <option value="SHA-1">SHA-1</option>
                <option value="SHA-256">SHA-256</option>
                <option value="SHA-384">SHA-384</option>
                <option value="SHA-512">SHA-512</option>
                <option value="SHA3-224">SHA3-224</option>
                <option value="SHA3-256">SHA3-256</option>
                <option value="SHA3-384">SHA3-384</option>
                <option value="SHA3-512">SHA3-512</option>
            </select>
        </div>

        <div class="mode-tabs">
            <button class="mode-btn active" data-mode="text">📝 文本模式</button>
            <button class="mode-btn" data-mode="file">📁 文件模式</button>
        </div>

        <div id="textPanel" class="panel active-panel">
            <textarea id="textInput" rows="5" placeholder="在此输入文本，例如：Hello World!&#10;支持中文、特殊字符等任意文本"></textarea>
            <div class="action-buttons">
                <button id="calcTextBtn" class="btn btn-primary">⚡ 计算文本哈希</button>
                <button id="clearTextBtn" class="btn btn-secondary">🗑 清空</button>
            </div>
        </div>

        <div id="filePanel" class="panel">
            <div class="file-area" id="fileDropArea">
                <label class="file-input-label">
                    📂 选择文件
                    <input type="file" id="fileInput">
                </label>
                <div id="fileInfo" class="file-info">未选择任何文件</div>
                <div style="font-size:0.7rem; margin-top:10px; color:#5e7e97;">支持点击或拖拽文件至此区域 (大文件分块处理)</div>
            </div>
            <div class="action-buttons">
                <button id="calcFileBtn" class="btn btn-primary">🔍 计算文件哈希</button>
                <button id="clearFileBtn" class="btn btn-secondary">⟳ 清除文件</button>
            </div>
        </div>

        <div class="result-area">
            <div class="result-label">
                📋 哈希结果
                <button id="copyHashBtn" class="copy-btn" style="float:right;">复制</button>
            </div>
            <div id="hashResult" class="hash-value">—— 等待计算 ——</div>
            <div id="statusMessage" class="status-msg" style="display: none;"></div>
        </div>
        <footer>✨ 基于 CryptoJS 实现，完整支持 SHA-3 系列。大文件采用分块读取 (1MB/块)，内存友好，不阻塞UI。</footer>
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const algoSelect = document.getElementById('algorithmSelect');
        const textPanel = document.getElementById('textPanel');
        const filePanel = document.getElementById('filePanel');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const textInput = document.getElementById('textInput');
        const calcTextBtn = document.getElementById('calcTextBtn');
        const clearTextBtn = document.getElementById('clearTextBtn');
        const fileInput = document.getElementById('fileInput');
        const fileInfoDiv = document.getElementById('fileInfo');
        const calcFileBtn = document.getElementById('calcFileBtn');
        const clearFileBtn = document.getElementById('clearFileBtn');
        const hashResultDiv = document.getElementById('hashResult');
        const copyHashBtn = document.getElementById('copyHashBtn');
        const statusMsgDiv = document.getElementById('statusMessage');
        const fileDropArea = document.getElementById('fileDropArea');

        let currentFile = null;
        let currentMode = 'text';
        let lastHashValue = '';

        function showStatus(message, isError = false) {
            statusMsgDiv.style.display = 'inline-block';
            statusMsgDiv.textContent = message;
            statusMsgDiv.style.backgroundColor = isError ? '#ffe6e5' : '#e6f4ea';
            statusMsgDiv.style.color = isError ? '#b91c1c' : '#2c6e2c';
            setTimeout(() => {
                if (statusMsgDiv.style.display === 'inline-block') {
                    setTimeout(() => {
                        if (statusMsgDiv.style.display === 'inline-block') 
                            statusMsgDiv.style.display = 'none';
                    }, 2500);
                }
            }, 2000);
        }

        function hideStatus() {
            statusMsgDiv.style.display = 'none';
        }

        function setHashResult(value) {
            if (!value) {
                hashResultDiv.innerHTML = '—— 无结果 ——';
                lastHashValue = '';
                return;
            }
            hashResultDiv.innerHTML = value;
            lastHashValue = value;
        }

        // ---------- 文本哈希计算 (同步转Promise) ----------
        function computeTextHashWithCryptoJS(text, algorithm) {
            return new Promise((resolve, reject) => {
                try {
                    let result = '';
                    switch(algorithm) {
                        case 'MD5':
                            result = CryptoJS.MD5(text).toString();
                            break;
                        case 'SHA-1':
                            result = CryptoJS.SHA1(text).toString();
                            break;
                        case 'SHA-256':
                            result = CryptoJS.SHA256(text).toString();
                            break;
                        case 'SHA-384':
                            result = CryptoJS.SHA384(text).toString();
                            break;
                        case 'SHA-512':
                            result = CryptoJS.SHA512(text).toString();
                            break;
                        case 'SHA3-224':
                            result = CryptoJS.SHA3(text, { outputLength: 224 }).toString();
                            break;
                        case 'SHA3-256':
                            result = CryptoJS.SHA3(text, { outputLength: 256 }).toString();
                            break;
                        case 'SHA3-384':
                            result = CryptoJS.SHA3(text, { outputLength: 384 }).toString();
                            break;
                        case 'SHA3-512':
                            result = CryptoJS.SHA3(text, { outputLength: 512 }).toString();
                            break;
                        default:
                            reject(new Error('不支持的算法: ' + algorithm));
                    }
                    resolve(result);
                } catch (err) {
                    reject(err);
                }
            });
        }

        // ---------- 文件哈希计算 (分块增量，支持所有算法包括 SHA3) ----------
        // CryptoJS 的算法对象都支持 .update() 增量更新，完美支持大文件
        function computeFileHashWithCryptoJS(file, algorithm) {
            return new Promise((resolve, reject) => {
                const chunkSize = 1024 * 1024; // 1MB
                let currentOffset = 0;
                const totalSize = file.size;
                let hasher = null;
                
                // 初始化 hasher (根据算法)
                try {
                    switch(algorithm) {
                        case 'MD5':
                            hasher = CryptoJS.algo.MD5.create();
                            break;
                        case 'SHA-1':
                            hasher = CryptoJS.algo.SHA1.create();
                            break;
                        case 'SHA-256':
                            hasher = CryptoJS.algo.SHA256.create();
                            break;
                        case 'SHA-384':
                            hasher = CryptoJS.algo.SHA384.create();
                            break;
                        case 'SHA-512':
                            hasher = CryptoJS.algo.SHA512.create();
                            break;
                        case 'SHA3-224':
                            hasher = CryptoJS.algo.SHA3.create({ outputLength: 224 });
                            break;
                        case 'SHA3-256':
                            hasher = CryptoJS.algo.SHA3.create({ outputLength: 256 });
                            break;
                        case 'SHA3-384':
                            hasher = CryptoJS.algo.SHA3.create({ outputLength: 384 });
                            break;
                        case 'SHA3-512':
                            hasher = CryptoJS.algo.SHA3.create({ outputLength: 512 });
                            break;
                        default:
                            reject(new Error('不支持的算法: ' + algorithm));
                    }
                } catch(err) {
                    reject(err);
                }
                
                function readNextChunk() {
                    if (currentOffset >= totalSize) {
                        const finalHash = hasher.finalize().toString();
                        resolve(finalHash);
                        return;
                    }
                    
                    const end = Math.min(currentOffset + chunkSize, totalSize);
                    const blob = file.slice(currentOffset, end);
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const arrayBuffer = e.target.result;
                        // 将 ArrayBuffer 转换为 CryptoJS WordArray
                        const wordArray = CryptoJS.lib.WordArray.create(new Uint8Array(arrayBuffer));
                        hasher.update(wordArray);
                        currentOffset = end;
                        const percent = ((currentOffset / totalSize) * 100).toFixed(1);
                        showStatus(`⏳ 计算 ${algorithm} 哈希... ${percent}%`, false);
                        // 继续下一块 (使用 setTimeout 避免阻塞)
                        setTimeout(readNextChunk, 0);
                    };
                    reader.onerror = function(err) {
                        reject(new Error('读取文件失败: ' + err.message));
                    };
                    reader.readAsArrayBuffer(blob);
                }
                
                readNextChunk();
            });
        }

        // 文本哈希入口
        async function computeTextHash() {
            const text = textInput.value;
            if (!text.trim()) {
                setHashResult('');
                showStatus('⚠️ 请输入文本内容', true);
                return;
            }
            const algo = algoSelect.value;
            try {
                showStatus(`⏳ 正在计算 ${algo} 哈希...`);
                const hash = await computeTextHashWithCryptoJS(text, algo);
                setHashResult(hash);
                showStatus(`✅ ${algo} 计算完成`);
            } catch (err) {
                console.error(err);
                setHashResult('');
                showStatus(`❌ 计算失败: ${err.message}`, true);
            }
        }

        // 文件哈希入口
        async function computeFileHash() {
            if (!currentFile) {
                showStatus('请先选择文件', true);
                setHashResult('');
                return;
            }
            const algo = algoSelect.value;
            try {
                showStatus(`📁 正在计算 ${currentFile.name} (${(currentFile.size / 1024).toFixed(1)} KB) 的 ${algo}...`);
                const hash = await computeFileHashWithCryptoJS(currentFile, algo);
                setHashResult(hash);
                showStatus(`✅ 文件 ${algo} 哈希完成`);
            } catch (err) {
                console.error(err);
                setHashResult('');
                showStatus(`❌ 文件处理失败: ${err.message}`, true);
            }
        }

        function updateFileInfo(file) {
            if (file) {
                const sizeText = file.size < 1024 ? `${file.size} B` : `${(file.size / 1024).toFixed(2)} KB`;
                fileInfoDiv.innerHTML = `📄 ${file.name} (${sizeText})`;
                currentFile = file;
                setHashResult('');
            } else {
                fileInfoDiv.innerHTML = '未选择任何文件';
                currentFile = null;
                setHashResult('');
            }
        }

        function handleFileSelect(file) {
            if (!file) return;
            updateFileInfo(file);
        }

        function clearFile() {
            fileInput.value = '';
            updateFileInfo(null);
            setHashResult('');
            hideStatus();
        }

        function setupDragAndDrop() {
            fileDropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileDropArea.style.background = '#eef7fc';
            });
            fileDropArea.addEventListener('dragleave', () => {
                fileDropArea.style.background = '#f9fdfe';
            });
            fileDropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                fileDropArea.style.background = '#f9fdfe';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                } else {
                    showStatus('拖拽无效，请重新选择', true);
                }
            });
        }

        function switchMode(mode) {
            currentMode = mode;
            if (mode === 'text') {
                textPanel.classList.add('active-panel');
                filePanel.classList.remove('active-panel');
                document.querySelector('[data-mode="text"]').classList.add('active');
                document.querySelector('[data-mode="file"]').classList.remove('active');
            } else {
                filePanel.classList.add('active-panel');
                textPanel.classList.remove('active-panel');
                document.querySelector('[data-mode="file"]').classList.add('active');
                document.querySelector('[data-mode="text"]').classList.remove('active');
            }
        }

        function copyHash() {
            if (lastHashValue && lastHashValue !== '—— 无结果 ——' && lastHashValue !== '—— 等待计算 ——') {
                navigator.clipboard.writeText(lastHashValue).then(() => {
                    showStatus('📋 哈希已复制到剪贴板');
                }).catch(() => showStatus('复制失败', true));
            } else {
                showStatus('没有可复制的哈希值', true);
            }
        }

        // 事件绑定
        calcTextBtn.addEventListener('click', computeTextHash);
        clearTextBtn.addEventListener('click', () => { textInput.value = ''; setHashResult(''); hideStatus(); });
        calcFileBtn.addEventListener('click', computeFileHash);
        clearFileBtn.addEventListener('click', clearFile);
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFileSelect(e.target.files[0]);
            else clearFile();
        });
        copyHashBtn.addEventListener('click', copyHash);
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-mode');
                if (mode === 'text') switchMode('text');
                else switchMode('file');
            });
        });
        
        setupDragAndDrop();
        switchMode('text');
        // 预设示例
        textInput.value = 'Hello World';
        setTimeout(() => {
            computeTextHash();
        }, 100);
    })();
</script>
</body>
</html>
