<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简二维码工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        #qrcode img, #qrcode canvas { margin: 0 auto; border: 8px solid white; border-radius: 4px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-2 tracking-tight">QR Toolbox</h1>
            <p class="text-slate-500 text-lg">生成与解析 · 纯前端处理 · 保护隐私</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            
            <section class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex items-center mb-6">
                    <div class="bg-blue-600 p-2 rounded-lg mr-3 shadow-lg shadow-blue-200">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">生成二维码</h2>
                </div>

                <textarea id="text-input" rows="4" 
                    class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all resize-none mb-6 text-slate-700 bg-slate-50"
                    placeholder="请输入文本或网址..."></textarea>
                
                <button onclick="generateQR()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-[0.98] shadow-xl shadow-blue-100">
                    立即生成
                </button>

                <div id="qrcode-wrapper" class="mt-8 flex flex-col items-center justify-center min-h-[220px] bg-slate-50 rounded-2xl border-2 border-dashed border-slate-100 aspect-square">
                    <div id="qrcode"></div>
                    <p id="qr-placeholder" class="text-slate-400 text-sm mt-2">等待内容输入...</p>
                </div>
            </section>

            <section class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex items-center mb-6">
                    <div class="bg-emerald-500 p-2 rounded-lg mr-3 shadow-lg shadow-emerald-100">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">解析二维码</h2>
                </div>
                
                <div id="drop-zone" class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center cursor-pointer hover:border-emerald-400 hover:bg-emerald-50 transition-all group bg-slate-50">
                    <input type="file" id="file-input" class="hidden" accept="image/*">
                    <div class="text-slate-500 group-hover:text-emerald-600">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="font-medium">拖拽图片到这里</p>
                        <p class="text-xs mt-1 text-slate-400">支持常用图片格式</p>
                    </div>
                </div>

                <div class="relative my-8 text-center">
                    <span class="absolute inset-x-0 top-1/2 -translate-y-1/2 border-t border-slate-100"></span>
                    <span class="relative bg-white px-4 text-xs font-bold text-slate-400 uppercase tracking-widest">OR</span>
                </div>

                <div class="flex gap-2 mb-6">
                    <input type="text" id="url-input" 
                        class="flex-1 p-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none text-sm bg-slate-50"
                        placeholder="输入图片 URL...">
                    <button onclick="decodeFromUrl()" class="bg-slate-800 text-white px-6 py-3 rounded-xl text-sm font-bold hover:bg-slate-900 transition-all active:scale-[0.95]">
                        解析
                    </button>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-tighter">Result / 解析结果</label>
                    <div class="p-5 bg-slate-50 text-slate-400 rounded-2xl break-all min-h-[150px] text-sm font-mono leading-relaxed shadow-inner">
                        <span id="result">等待解析...</span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <canvas id="temp-canvas" class="hidden"></canvas>

    <script>
        /**
         * 修复后的生成逻辑
         * 不再使用持久化的对象，而是按需创建，避免库内部状态冲突
         */
        function generateQR() {
            const textInput = document.getElementById("text-input");
            const qrContainer = document.getElementById("qrcode");
            const placeholder = document.getElementById("qr-placeholder");
            const text = textInput.value.trim();

            if (!text) {
                alert("请先输入内容再生成");
                return;
            }

            // 1. 清空旧内容
            qrContainer.innerHTML = "";
            placeholder.style.display = "none";

            // 2. 重新实例化（这样最稳）
            QRCode.toDataURL(text, (err, url) => {
                if (err) {
                    console.error("生成失败:", err);
                    alert("生成二维码时出错");
                } else {
                    qrContainer.innerHTML = `<img src="${url}"/>`
                }
            });
        }

        /**
         * 解析逻辑 (保持健壮性)
         */
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultSpan = document.getElementById('result');
        const canvas = document.getElementById('temp-canvas');
        const ctx = canvas.getContext('2d');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => handleFiles(e.target.files);

        // 拖拽手感优化
        ['dragenter', 'dragover'].forEach(n => {
            dropZone.addEventListener(n, e => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
        });
        ['dragleave', 'drop'].forEach(n => {
            dropZone.addEventListener(n, e => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
            });
        });
        dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => processImage(e.target.result);
                    reader.readAsDataURL(file);
                }
            }
        }

        function decodeFromUrl() {
            const url = document.getElementById('url-input').value;
            if (url) processImage(url);
        }

        function processImage(src) {
            resultSpan.innerText = '正在扫描图片...';
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imgData.data, imgData.width, imgData.height);

                if (code) {
                    resultSpan.className = "text-slate-950";
                    resultSpan.innerText = code.data;
                } else {
                    resultSpan.className = "text-rose-400";
                    resultSpan.innerText = '未发现有效的二维码';
                }
            };
            img.onerror = () => {
                resultSpan.className = "text-rose-400";
                resultSpan.innerText = '图片加载失败 (请检查链接或跨域权限)';
            };
            img.src = src;
        }
    </script>
</body>
</html>
