<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>舒尔特表测试</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 24px 28px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      min-width: 320px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 600;
    }

    .controls {
      margin-bottom: 12px;
    }

    input {
      width: 80px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      text-align: center;
    }

    .timer {
      font-size: 16px;
      color: #666;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      gap: 10px;
      justify-content: center;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid #eee;
      user-select: none;
    }

    .cell:hover {
      background: #f0f0f0;
    }

    .cell.correct {
      background: #4caf50;
      color: white;
      border-color: #4caf50;
    }

    .cell.wrong {
      background: #ff5252;
      color: white;
    }

    .footer {
      margin-top: 16px;
    }

    button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #4f7cff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #3d66d6;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>舒尔特表测试</h1>

    <div class="controls">
      尺寸：
      <input id="sizeInput" type="number" min="2" max="20" value="5" />
      <button onclick="applySize()" style="margin-left:8px">应用</button>
    </div>

    <div class="timer" id="timer">时间：0.00 秒</div>
    <div class="grid" id="grid"></div>

    <div class="footer">
      <button onclick="init()">重新开始</button>
    </div>
  </div>

  <script>
    let size = 5;
    let numbers = [];
    let current = 1;
    let startTime = null;
    let timerInterval = null;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function applySize() {
      const input = document.getElementById('sizeInput');
      let val = parseInt(input.value);

      if (isNaN(val) || val < 2) val = 2;
      if (val > 20) val = 20;

      size = val;
      input.value = val;
      document.getElementById('sizeLabel').textContent = val;

      init();
    }

    function init() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

      const cellSize = Math.max(32, 320 / size);

      numbers = Array.from({ length: size * size }, (_, i) => i + 1);
      shuffle(numbers);

      current = 1;
      startTime = null;
      clearInterval(timerInterval);
      updateTimer(0);

      numbers.forEach(num => {
        const div = document.createElement('div');
        div.className = 'cell';
        div.textContent = num;
        div.style.width = cellSize + 'px';
        div.style.height = cellSize + 'px';

        div.onclick = () => handleClick(div, num);
        grid.appendChild(div);
      });
    }

    function handleClick(el, num) {
      if (num === current) {
        if (current === 1) {
          start();
        }

        el.classList.add('correct');
        current++;

        if (current > size * size) {
          finish();
        }
      } else {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 300);
      }
    }

    function start() {
      startTime = performance.now();
      timerInterval = setInterval(() => {
        const t = (performance.now() - startTime) / 1000;
        updateTimer(t);
      }, 50);
    }

    function updateTimer(t) {
      document.getElementById('timer').textContent = `时间：${t.toFixed(2)} 秒`;
    }

    function finish() {
      clearInterval(timerInterval);
      const total = (performance.now() - startTime) / 1000;
      updateTimer(total);
      setTimeout(() => {
        alert(`完成！用时 ${total.toFixed(2)} 秒`);
      }, 100);
    }

    init();
  </script>
</body>
</html>
